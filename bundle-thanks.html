<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Free Bundle is Ready | Numberbender</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="images/exports/numberbender-favicon.svg">
  <style>
    body{ background: var(--bg); display: flex; flex-direction: column; min-height: 100vh; }
    .thanks-wrap{
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 60px 20px;
    }
    .thanks-card{
      background: white; border: 1px solid var(--border);
      border-radius: 20px; padding: 48px 44px;
      max-width: 560px; width: 100%;
      box-shadow: 0 8px 40px rgba(37,99,235,.10);
      text-align: center;
    }
    .thanks-icon{ font-size: 3rem; margin-bottom: 16px; }
    .thanks-card h1{
      font-size: 1.8rem; font-weight: 800;
      color: var(--navy); margin-bottom: 10px;
    }
    .thanks-card p{
      color: var(--muted); font-size: 1.05rem;
      margin-bottom: 28px; line-height: 1.6;
    }
    .subject-label{
      display: inline-block;
      background: rgba(37,99,235,.10); color: var(--blue);
      font-weight: 700; font-size: 1rem;
      padding: 6px 18px; border-radius: 999px;
      text-transform: capitalize; margin-bottom: 28px;
    }
    .btn-download{
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--blue); color: white;
      font-size: 1.05rem; font-weight: 700;
      padding: 14px 32px; border-radius: 12px;
      text-decoration: none; margin-bottom: 20px;
      transition: background .2s;
    }
    .btn-download:hover{ background: #1d4ed8; }
    .note{
      font-size: 0.85rem; color: var(--muted);
      margin-top: 16px;
    }
    .back-link{
      display: inline-block; margin-top: 28px;
      font-size: 0.9rem; color: var(--blue);
      text-decoration: none; font-weight: 600;
    }
    .back-link:hover{ text-decoration: underline; }
  .skip-link{position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;}.skip-link:focus{position:fixed;top:0;left:0;width:auto;height:auto;padding:8px 16px;background:#0F2B3D;color:#fff;z-index:9999;font-size:14px;text-decoration:none;border-radius:0 0 4px 0;}</style>
</head>
<body>
<a class="skip-link" href="#main-content">Skip to main content</a>


<header class="site-header">
  <div class="container header-inner">
    <a href="/" class="logo logo-lockup" aria-label="Numberbender">
      <img src="images/numberbender_banner_only.svg" alt="Numberbender" class="lockup-img">
    </a>
  </div>
</header>

<main id="main-content">
<div class="thanks-wrap">
  <div class="thanks-card">
    <div class="thanks-icon">🎉</div>
    <h1>Your bundle is ready!</h1>
    <p id="thanks-msg">Thank you for joining the Numberbender community. Your free worksheet bundle is ready to download below.</p>
    <div class="subject-label" id="subject-display">Loading…</div><br>
    <a class="btn-download" id="download-btn" href="#">
      ⬇ Download ZIP Bundle
    </a>
    <p class="note">All worksheets include full answer keys. No expiry — keep it forever.</p>
    <br>
    <a class="back-link" href="/math-worksheets">← Browse more worksheets</a>
  </div>
</div>

<script>
  var bundles = {
    'algebra':                'https://drive.google.com/uc?export=download&id=1PESzsinW9RI2pTjS8XO2VGsBoyY6Mgij',
    'precalculus':            'https://drive.google.com/uc?export=download&id=1Zo8ONNpjWrO0RtG-Kpda7xJMkuU_BK1y',
    'statistics':             'https://drive.google.com/uc?export=download&id=1VQAiqCb5BtrgCL8gwN9rIxHWwUuILp2z',
    'calculus':               'https://drive.google.com/uc?export=download&id=1LqSo9cpmISWGmOK7IkZmExB0_SzbRkGC',
    'geometry':               'https://drive.google.com/uc?export=download&id=1DsNHzyFYzF0bJpLZ29dRC0YnSXLZlmR9',
    'inferential-statistics': 'https://drive.google.com/uc?export=download&id=10nyhuUSazUki0rOhJ_RgQA64523GiVg8',
    'trigonometry':           'https://drive.google.com/uc?export=download&id=1h2kUq19cbTgzckEJalUAbg5TsInCBZuL',
    'analytic-geometry':      'https://drive.google.com/uc?export=download&id=1u45xoKvcXCHs60WDzrIzQ6pMjUdm5QeC',
    'discrete-math':          'https://drive.google.com/uc?export=download&id=1uUJ30pk2HnCsVQI1IMv_QmNqAWM8qvWz',
    'linear-algebra':         'https://drive.google.com/uc?export=download&id=1dbwvHB1j-NXOzuy22JvP3Jb52txB7gCL',
    'elementary-algebra':     'https://drive.google.com/uc?export=download&id=1g-zO5uScjZxCugTMf4jH8lSaNQRbzLoz',
    'intermediate-algebra':   'https://drive.google.com/uc?export=download&id=1ntnA3RMz5l6RBx0kQwSbFI_CD45kaoR1',
    'logarithms':             'https://drive.google.com/uc?export=download&id=1j9v3MxK7Ox7E_62KLhUBKgq_-RAl9nbN'
  };

  var labels = {
    'algebra': 'Algebra', 'precalculus': 'Precalculus',
    'statistics': 'Statistics', 'calculus': 'Calculus',
    'geometry': 'Geometry', 'inferential-statistics': 'Inferential Statistics',
    'trigonometry': 'Trigonometry', 'analytic-geometry': 'Analytic Geometry',
    'discrete-math': 'Discrete Math', 'linear-algebra': 'Linear Algebra',
    'elementary-algebra': 'Elementary Algebra', 'intermediate-algebra': 'Intermediate Algebra',
    'logarithms': 'Logarithms'
  };

  var params = new URLSearchParams(window.location.search);
  var subject = params.get('subject') || '';
  var btn = document.getElementById('download-btn');
  var display = document.getElementById('subject-display');

  if (bundles[subject]) {
    display.textContent = labels[subject] + ' Bundle';
    btn.href = bundles[subject];
    btn.setAttribute('download', '');
  } else {
    display.style.display = 'none';
    document.getElementById('thanks-msg').textContent =
      'Thank you for joining! Browse all subject bundles below.';
    btn.style.display = 'none';
  }
</script>

</main>
</body>
</html>
