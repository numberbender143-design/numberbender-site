# ============================================================
#  Numberbender — netlify.toml
#  SEO-optimized build config, redirects, cache & security
# ============================================================

# --------------- Build settings ---------------
[build]
  publish = "."          # Root is the site (no build step)

# --------------- Redirects ---------------
# Pretty-URL rewrites: strip .html so canonical URLs are clean
# Google prefers one canonical form; these ensure the .html version
# redirects to the extensionless version with a 301 (permanent).

